name: briefing

on:
  # dashboard.txt는 고정된 시각이 아니라 매일 claude.ai에서 브리핑을 작성한 뒤
  # 사용자가 커밋하는 시점에 완성된다. 고정 시각(cron-job.org 06:50 등)에 맞춰
  # 발송하면 아직 오늘자 커밋 전이라 어제 파일이 나가는 문제가 생기므로,
  # dashboard.txt가 실제로 바뀌는 순간(push)에 반응하도록 트리거를 바꾼다.
  push:
    branches: [main]
    paths:
      - dashboard.txt
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install requests feedparser tzdata
      - name: run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python briefing.py
